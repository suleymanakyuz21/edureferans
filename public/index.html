<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap | EduPlatform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, var(--bg-dark-1) 0%, var(--bg-dark-2) 100%);
        }
        .auth-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }
        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .auth-logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #a5b4fc, #818cf8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 0.5rem;
        }
        .auth-tabs {
            display: flex;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 2rem;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.3s;
        }
        .auth-tab.active {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .auth-form {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }
        .auth-form.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>

    <div class="auth-container animate-fade-up">
        <div class="auth-card">
            <div class="auth-header">
                <a href="/" class="auth-logo">EduPlatform.</a>
                <p class="text-secondary" style="font-size: 0.95rem;">Hesabınıza giriş yapın veya aramıza katılın.</p>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Giriş Yap</div>
                <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Kayıt Ol</div>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label>Email Adresi</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="ornek@mail.com" required>
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block mt-1">Giriş Yap</button>
                <p id="loginError" class="text-danger mt-1 text-center" style="font-size: 0.9rem;"></p>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label>Ad Soyad</label>
                    <input type="text" id="registerName" class="form-control" placeholder="Adınız Soyadınız" required>
                </div>
                <div class="form-group">
                    <label>Email Adresi</label>
                    <input type="email" id="registerEmail" class="form-control" placeholder="ornek@mail.com" required>
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="registerPassword" class="form-control" placeholder="En az 6 karakter" required>
                </div>
                <div class="form-group">
                    <label>Davet Kodu <span class="text-secondary" style="font-size: 0.8rem;">(İsteğe bağlı)</span></label>
                    <input type="text" id="registerRefCode" class="form-control" placeholder="Varsa referans kodu">
                </div>
                <button type="submit" class="btn btn-primary btn-block mt-1">Hesabımı Oluştur</button>
                <p id="registerError" class="text-danger mt-1 text-center" style="font-size: 0.9rem;"></p>
                <p id="registerSuccess" class="text-success mt-1 text-center" style="font-size: 0.9rem;"></p>
            </form>

            <a href="/" class="back-link">← Ana Sayfaya Dön</a>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            if (tab === 'login') {
                document.getElementById('loginForm').classList.add('active');
                document.title = "Giriş Yap | EduPlatform";
            } else {
                document.getElementById('registerForm').classList.add('active');
                document.title = "Kayıt Ol | EduPlatform";
            }
        }

        // Ana sayfadan "Kayıt Ol" butonuna tıklandığında direkt Kayıt tabını açmak için
        if (window.location.hash === '#register-section') {
            switchTab('register');
        }
    </script>
</body>
</html>
